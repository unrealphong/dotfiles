add_newline = false
command_timeout = 2000

palette = 'catppuccin_mocha'

format = '[](surface0)[󱍢 henry](fg:rosewater bg:surface0)[](surface0) $all'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
orange = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[character]
format = "$symbol "
success_symbol = "[◉](bold bright-yellow)"
error_symbol = "[⊘](italic purple)"

[conda]
format = '[\[$environment\]](white) '
ignore_base = false
style = "white"

[python]
symbol = " "
version_format = "v${major}.${minor}"
style = "green"

[ruby]
symbol = " "
style = "red"

[rust]
symbol = " "

[golang]
symbol = " "

[php]
symbol = " "

[nodejs]
symbol = " "

[directory]
style = "cyan bold"

[aws]
format = 'on [$profile:<$region>]($style) '
style = 'bold green'

[line_break]
disabled = false
