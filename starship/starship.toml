[username]
show_always = true
style_user = "fg:#ffffff bg:#0969da"
style_root = "fg:#ffffff bg:#0969da"
format = '[$user ]($style)'
disabled = false

[directory]
style = "fg:#000000 bg:#eac54f"
format = "[ $path ]($style)"
disabled = false

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "fg:#ffffff bg:#e44729"
format = '[ $symbol $branch ]($style)'
disabled = false

[git_status]
style = "fg:#ffffff bg:#e44729"
# format = '[$all_status $ahead_behind]($style)'
format = '[ $all_statuses ($progress_current/$progress_total)]($style)'
ignore_submodules = true
untracked = ""
disabled = false

