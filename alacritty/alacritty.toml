[font]
  size = 18
  [font.normal]
    # family = "FantasqueSansM Nerd Font Mono"
    family = "JetBrainsMono NF"
[window]
  padding = { x = 5, y = 5 }
  dimensions = { columns = 120, lines = 40  }
  opacity= 0.95
  decorations = "Buttonless"

[cursor]
  unfocused_hollow = true
  style = {shape ="Beam",blinking = "On"}

[env]
  TERM = "xterm-256color"

[scrolling]
  history = 5000 

[[keyboard.bindings]]
  key = "F12"
  action = "ToggleFullscreen"

[colors]
  [colors.primary]
      background= '#282a36'
      foreground= '#f8f8f2'
    [colors.search]
      matches={ foreground= '#44475a',background= '#50fa7b'}
      focused_match={ foreground='#44475a', background= '#ffb86c'}
  [colors.normal]
      black=   '#000000'
      red=   '#ff5555'
      green=   '#50fa7b'
      yellow=  '#f1fa8c'
      blue=  '#bd93f9'
      magenta= '#ff79c6'
      cyan=    '#8be9fd'
      white=   '#bfbfbf'
    [colors.bright]
      black=   '#4d4d4d'
      red=   '#ff6e67'
      green=   '#5af78e'
      yellow=  '#f4f99d'
      blue=  '#caa9fa'
      magenta= '#ff92d0'
      cyan=    '#9aedfe'
      white=   '#e6e6e6'
    [colors.dim]
      black=   '#14151b'
      red=   '#ff2222'
      green=   '#1ef956'
      yellow= '#ebf85b'
      blue=    '#4d5b86'
      magenta= '#ff46b0'
      cyan=    '#59dffc'
      white=   '#e6e6d1'


