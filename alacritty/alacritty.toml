import = ["~/workspace/dotfiles/alacritty/themes/gruvbox_material.toml"]
live_config_reload = true 

[font]
size = 16
normal = {family = "JetBrainsMono Nerd Font Mono",  style = "Regular"}
bold = {family = "JetBrainsMono Nerd Font Mono",  style = "Bold"}
italic = {family = "JetBrainsMono Nerd Font Mono",  style = "Italic"}

[window]
padding = { x = 10, y = 10 }
dimensions = { columns = 120, lines = 40 }
opacity = 1 
decorations = "Buttonless"                 #  "Full" | "None" | "Transparent" | "Buttonless"
blur = true
startup_mode = "Windowed" # "Windowed" | "Maximized" | "Fullscreen" | "SimpleFullscreen"

[cursor]
unfocused_hollow = true
style = { shape = "Block", blinking = "On" } # shape = "Block" | "Underline" | "Beam" 

[env]
TERM = "xterm-256color"

[scrolling]
history = 10000


[[keyboard.bindings]]
key = "F12"
action = "ToggleFullscreen"
